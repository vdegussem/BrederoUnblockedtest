<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTopper - Proxy Search</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        .container { 
            text-align: center; 
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 { 
            color: #00d1ff; 
            font-size: 48px;
            margin-bottom: 20px; 
            letter-spacing: -1px;
        }

        .url-input {
            width: 650px; 
            max-width: 90%; 
            padding: 18px 30px; 
            border-radius: 50px; 
            border: 1px solid #444; 
            background: #222; 
            color: white; 
            font-size: 18px; 
            outline: none; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .url-input:focus { 
            border-color: #00d1ff; 
            background: #2a2a2a; 
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.25);
        }

        .btn-group { margin-top: 30px; }
        
        .go-btn {
            padding: 14px 45px; 
            background: #00d1ff; 
            color: black; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 209, 255, 0.2);
        }

        .go-btn:hover { 
            background: #00b8e6; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 209, 255, 0.3);
        }

        /* Sectie voor alleen plaatjes */
        .quick-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .quick-links a {
            transition: transform 0.2s;
            display: inline-block;
        }

        .quick-links a:hover {
            transform: scale(1.15);
        }

        .quick-links img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        
        .status-msg { 
            font-size: 13px; 
            color: #777; 
            margin-top: 40px; 
        }

        a { color: #00d1ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>WebTopper</h1>
        
        <input type="text" id="siteUrl" class="url-input" placeholder="Zoek of typ een URL..." autofocus>
        
        <div class="btn-group">
            <button class="go-btn" onclick="loadSite()">Proxy Zoeken</button>
        </div>

        <!-- Alleen plaatjes onder de knop -->
        <div class="quick-links">
            <a href="javascript:void(0)" onclick="quickLoad('https://youtube.com')">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/042/127/234/small/white-square-bordered-youtube-logo-on-transparent-background-free-png.png" alt="">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://wikipedia.org')">
                <img src="https://1000logos.net/wp-content/uploads/2021/11/Wikipedia-Logo-20031.png" alt="">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://discord.com')">
                <img src="https://static.vecteezy.com/system/resources/previews/018/930/718/non_2x/discord-logo-discord-icon-transparent-free-png.png" alt="">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://tiktok.com')">
                <img src="https://www.freepnglogos.com/uploads/tik-tok-logo-png/tik-tok-how-use-tiktok-create-cool-videos-with-iphone-14.png" alt="">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://instagram.com')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1280px-Instagram_logo_2016.svg.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail" alt="">
            </a>
        </div>

        <div class="status-msg">
            Tip: Werkt het niet? Bezoek eerst 
            <a href="https://onrender.com" target="_blank">deze link</a> 
            om de server te wekken.
        </div>
    </div>

    <script>
        function loadSite() {
            let input = document.getElementById('siteUrl').value.trim();
            let proxyUrl = "https://onrender.com"; 

            if (input) {
                let targetUrl = "";
                const isUrl = input.includes('.') && !input.includes(' ');

                if (isUrl) {
                    targetUrl = input.startsWith('http') ? input : 'https://' + input;
                } else {
                    targetUrl = 'https://google.com' + encodeURIComponent(input);
                }
                
                window.location.href = proxyUrl + targetUrl;
            } else {
                alert("Typ eerst iets in!");
            }
        }

        function quickLoad(url) {
            let proxyUrl = "https://onrender.com"; 
            window.location.href = proxyUrl + url;
        }

        document.getElementById('siteUrl').addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                loadSite();
            }
        });
    </script>

</body>
</html>
