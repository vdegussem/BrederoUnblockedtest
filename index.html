<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTopper - Proxy Search</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        .container { 
            text-align: center; 
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 { 
            color: #00d1ff; 
            font-size: 48px;
            margin-bottom: 20px; 
            letter-spacing: -1px;
        }

        /* De lange, ronde zoekbalk */
        .url-input {
            width: 650px; 
            max-width: 90%; 
            padding: 18px 30px; 
            border-radius: 50px; 
            border: 1px solid #444; 
            background: #222; 
            color: white; 
            font-size: 18px; 
            outline: none; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .url-input:focus { 
            border-color: #00d1ff; 
            background: #2a2a2a; 
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.25);
        }

        .btn-group { margin-top: 30px; }
        
        .go-btn {
            padding: 14px 45px; 
            background: #00d1ff; 
            color: black; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 209, 255, 0.2);
        }

        .go-btn:hover { 
            background: #00b8e6; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 209, 255, 0.3);
        }
        
        .status-msg { 
            font-size: 13px; 
            color: #777; 
            margin-top: 40px; 
        }

        a { color: #00d1ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>WebTopper</h1>
        
        <input type="text" id="siteUrl" class="url-input" placeholder="Zoek op Google of typ een URL..." autofocus>
        
        <div class="btn-group">
            <button class="go-btn" onclick="loadSite()">Proxy Zoeken</button>
        </div>

        <div class="status-msg">
            Tip: Werkt het niet? Bezoek eerst 
            <a href="https://webtopper-1.onrender.com/" target="_blank">deze link</a> 
            om de server te wekken.
        </div>
    </div>

    <script>
        function loadSite() {
            let input = document.getElementById('siteUrl').value.trim();
            // Gebruik jouw werkende proxy URL
            let proxyUrl = "https://webtopper-1.onrender.com/"; 

            if (input) {
                let targetUrl = "";

                // Check of het een URL is (bevat een punt en geen spatie)
                const isUrl = input.includes('.') && !input.includes(' ');

                if (isUrl) {
                    // Het is een URL: voeg https:// toe indien nodig
                    targetUrl = input.startsWith('http') ? input : 'https://' + input;
                } else {
                    // Het is een zoekopdracht: vervang spaties door plussen
                    let query = input.split(' ').join('+');
                    targetUrl = 'https://www.google.com/search?q=' + query;
                }
                
                // Combineer proxy + target
                let finalUrl = proxyUrl + targetUrl;

                console.log("Navigeren naar: " + finalUrl);
                window.location.href = finalUrl;
            } else {
                alert("Typ eerst iets in de zoekbalk!");
            }
        }

        document.getElementById('siteUrl').addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                loadSite();
            }
        });
    </script>

</body>
</html>
