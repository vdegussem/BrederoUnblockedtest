<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrederoUnblocked - No Frame</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; 
        }
        
        .container { text-align: center; background: #333; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00d1ff; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 25px; }
        
        .url-input {
            width: 350px; padding: 15px; border-radius: 25px; border: 2px solid #444; 
            background: #222; color: white; font-size: 16px; outline: none; transition: 0.3s;
        }

        .url-input:focus { border-color: #00d1ff; background: #2a2a2a; }

        .btn-group { margin-top: 25px; }
        
        .go-btn {
            padding: 15px 40px; background: #00d1ff; color: black; 
            border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.2s;
        }

        .go-btn:hover { background: #00b8e6; transform: scale(1.05); }
        
        .status-msg { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BrederoUnblocked</h1>
        <p>Voer een URL in om deze via jouw proxy te openen</p>
        <input type="text" id="siteUrl" class="url-input" placeholder="bijv. youtube.com" autofocus>
        
        <div class="btn-group">
            <button class="go-btn" onclick="loadSite()">Open via Proxy</button>
        </div>
        <div class="status-msg">Tip: Werkt het niet? Bezoek eerst <a href="https://webtopper-1.onrender.com/" target="_blank" style="color:#00d1ff;">deze link</a> om de server te wekken.</div>
    </div>

    <script>
        function loadSite() {
            let input = document.getElementById('siteUrl').value.trim();
            let proxyUrl = "https://webtopper-1.onrender.com/"; 

            if (input) {
                let targetUrl = input;

                if (!targetUrl.startsWith('http')) {
                    targetUrl = 'https://' + targetUrl;
                }
                
                let finalUrl = proxyUrl + targetUrl;

                // --- ABOUT:BLANK CLOAKING ---
                let newWin = window.open('about:blank', '_blank');

                if (!newWin) {
                    alert("Pop-up geblokkeerd! Klik rechtsboven in de adresbalk op 'Toestaan'.");
                    return;
                }

                newWin.document.write(`
                    <html>
                    <head>
                        <title>BrederoUnblocked</title>
                        <link rel="icon" type="image/x-icon" href="https://google.com">
                        <style>
                            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                            iframe { width: 100%; height: 100%; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${finalUrl}"></iframe>
                    </body>
                    </html>
                `);
                newWin.document.close();
            } else {
                alert("Typ eerst een URL in!");
            }
        }

        document.getElementById('siteUrl').addEventListener("keypress", function(e) {
            if (e.key === "Enter") loadSite();
        });
    </script>

</body>
</html>
